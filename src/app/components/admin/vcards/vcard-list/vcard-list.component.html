<div class="table-container">

  <div class="table-header">
    <h2><mat-icon style="vertical-align:middle; margin-right:8px; color:#546e7a;">contact_page</mat-icon>Vcards</h2>
    <button mat-raised-button color="primary" routerLink="/admin/vcards/nuevo">
      <mat-icon>add</mat-icon> Nueva vcard
    </button>
  </div>

  <div *ngIf="cargando" style="display:flex; justify-content:center; padding:48px;">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!cargando">
    <table mat-table [dataSource]="vcards" class="full-width">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let v">{{ v.contactID }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let v">
          <strong>{{ v.nombres }} {{ v.primerApellido }}</strong>
          <div style="font-size:0.75rem; color:#90a4ae;">{{ v.segundoApellido }}</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="puesto">
        <th mat-header-cell *matHeaderCellDef>Puesto</th>
        <td mat-cell *matCellDef="let v">{{ v.puesto }}</td>
      </ng-container>

      <ng-container matColumnDef="empresa">
        <th mat-header-cell *matHeaderCellDef>Empresa</th>
        <td mat-cell *matCellDef="let v">{{ v.empresa }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let v">{{ v.email }}</td>
      </ng-container>

      <ng-container matColumnDef="telefono">
        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
        <td mat-cell *matCellDef="let v">{{ v.telefonoMovil }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="action-cell">Acciones</th>
        <td mat-cell *matCellDef="let v" class="action-cell">
          <button mat-icon-button color="primary" (click)="editar(v.contactID)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(v)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <div *ngIf="vcards.length === 0" style="text-align:center; padding:48px; color:#90a4ae;">
      <mat-icon style="font-size:48px; width:48px; height:48px; opacity:0.4;">contact_page</mat-icon>
      <p>No hay vcards registradas.</p>
      <button mat-stroked-button color="primary" routerLink="/admin/vcards/nuevo">Crear primera vcard</button>
    </div>
  </div>

</div>
