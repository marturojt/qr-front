<div class="table-container">

  <div class="table-header">
    <h2><mat-icon style="vertical-align:middle; margin-right:8px; color:#546e7a;">manage_accounts</mat-icon>Usuarios</h2>
    <button mat-raised-button color="primary" routerLink="/admin/usuarios/nuevo">
      <mat-icon>add</mat-icon> Nuevo usuario
    </button>
  </div>

  <div *ngIf="cargando" style="display:flex; justify-content:center; padding:48px;">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!cargando">
    <table mat-table [dataSource]="usuarios" class="full-width">

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let u">
          <strong>{{ u.nombres }} {{ u.primerApellido }}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u">{{ u.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Rol</th>
        <td mat-cell *matCellDef="let u">
          <mat-chip-set>
            <mat-chip [color]="u.role === 'Admin' ? 'primary' : 'accent'" highlighted>
              {{ u.role }}
            </mat-chip>
          </mat-chip-set>
        </td>
      </ng-container>

      <ng-container matColumnDef="verificado">
        <th mat-header-cell *matHeaderCellDef>Email verificado</th>
        <td mat-cell *matCellDef="let u">
          <mat-icon [style.color]="u.isVerified ? '#43a047' : '#bdbdbd'">
            {{ u.isVerified ? 'check_circle' : 'radio_button_unchecked' }}
          </mat-icon>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="action-cell">Acciones</th>
        <td mat-cell *matCellDef="let u" class="action-cell">
          <button mat-icon-button color="primary" (click)="editar(u.id)" matTooltip="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(u)" matTooltip="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <div *ngIf="usuarios.length === 0" style="text-align:center; padding:48px; color:#90a4ae;">
      <mat-icon style="font-size:48px; width:48px; height:48px; opacity:0.4;">manage_accounts</mat-icon>
      <p>No hay usuarios registrados.</p>
      <button mat-stroked-button color="primary" routerLink="/admin/usuarios/nuevo">Crear primer usuario</button>
    </div>
  </div>

</div>
