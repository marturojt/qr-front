<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; max-width:800px;">

  <mat-card class="hoverable-card" routerLink="/admin/vcards" style="cursor:pointer;">
    <mat-card-content style="display:flex; align-items:center; gap:16px; padding:24px;">
      <div style="width:56px; height:56px; border-radius:16px; background:#e8f5e9; display:flex; align-items:center; justify-content:center;">
        <mat-icon style="color:#2e7d32; font-size:28px; width:28px; height:28px;">contact_page</mat-icon>
      </div>
      <div>
        <div style="font-size:1rem; font-weight:500; color:#263238;">Vcards</div>
        <div style="font-size:0.8rem; color:#90a4ae; margin-top:2px;">Gestionar tarjetas de contacto</div>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="hoverable-card" routerLink="/admin/usuarios" style="cursor:pointer;">
    <mat-card-content style="display:flex; align-items:center; gap:16px; padding:24px;">
      <div style="width:56px; height:56px; border-radius:16px; background:#e3f2fd; display:flex; align-items:center; justify-content:center;">
        <mat-icon style="color:#1565c0; font-size:28px; width:28px; height:28px;">manage_accounts</mat-icon>
      </div>
      <div>
        <div style="font-size:1rem; font-weight:500; color:#263238;">Usuarios</div>
        <div style="font-size:0.8rem; color:#90a4ae; margin-top:2px;">Gestionar accesos al sistema</div>
      </div>
    </mat-card-content>
  </mat-card>

</div>
