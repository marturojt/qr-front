<div class="login-bg">
  <div class="login-card-wrapper">
    <mat-card class="login-card" style="text-align:center;">

      <mat-card-content style="padding:32px 16px;">

        <div *ngIf="emailStatus == EmailStatus.Verifying">
          <mat-spinner diameter="48" style="margin:auto;"></mat-spinner>
          <p style="margin-top:16px; color:#90a4ae;">Verificando tu cuenta...</p>
        </div>

        <div *ngIf="emailStatus == EmailStatus.Failed">
          <mat-icon style="font-size:56px; width:56px; height:56px; color:#ef9a9a;">cancel</mat-icon>
          <h3 style="color:#546e7a;">Verificación fallida</h3>
          <p style="color:#90a4ae;">El enlace no es válido o ha expirado. Puedes solicitar uno nuevo.</p>
          <a routerLink="../forgot-password" mat-raised-button color="primary">Solicitar nuevo enlace</a>
        </div>

      </mat-card-content>

    </mat-card>
  </div>
</div>
