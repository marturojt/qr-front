<div class="login-bg">
  <div class="login-card-wrapper">
    <mat-card class="login-card">

      <mat-card-header>
        <mat-card-title>Nueva contraseña</mat-card-title>
      </mat-card-header>

      <mat-card-content>

        <div *ngIf="tokenStatus == TokenStatus.Validating" style="text-align:center; padding:32px 0;">
          <mat-spinner diameter="40" style="margin:auto;"></mat-spinner>
          <p style="margin-top:12px; color:#90a4ae;">Validando enlace...</p>
        </div>

        <div *ngIf="tokenStatus == TokenStatus.Invalid" style="text-align:center; padding:16px 0;">
          <mat-icon style="font-size:48px; width:48px; height:48px; color:#ef9a9a;">link_off</mat-icon>
          <p style="color:#546e7a;">El enlace no es válido o ha expirado.</p>
          <a routerLink="../forgot-password" mat-button color="primary">Solicitar nuevo enlace</a>
        </div>

        <form *ngIf="tokenStatus == TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()" style="padding-top:8px;">

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nueva contraseña</mat-label>
            <input matInput [type]="ocultarPwd ? 'password' : 'text'" formControlName="password">
            <button mat-icon-button matSuffix type="button" (click)="ocultarPwd = !ocultarPwd">
              <mat-icon>{{ ocultarPwd ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="f['password'].hasError('required')">Requerido</mat-error>
            <mat-error *ngIf="f['password'].hasError('minlength')">Mínimo 6 caracteres</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Confirmar contraseña</mat-label>
            <input matInput [type]="ocultarConfirm ? 'password' : 'text'" formControlName="confirmPassword">
            <button mat-icon-button matSuffix type="button" (click)="ocultarConfirm = !ocultarConfirm">
              <mat-icon>{{ ocultarConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="form.hasError('noMatch')">Las contraseñas no coinciden</mat-error>
          </mat-form-field>

          <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
            <a routerLink="../login" mat-button>Cancelar</a>
            <button mat-raised-button color="primary" type="submit" [disabled]="loading">
              {{ loading ? 'Guardando...' : 'Guardar' }}
            </button>
          </div>

        </form>
      </mat-card-content>

    </mat-card>
  </div>
</div>
