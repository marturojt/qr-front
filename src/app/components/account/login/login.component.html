<div class="login-bg">
  <div class="login-card-wrapper">
    <mat-card class="login-card">

      <div style="text-align:center; padding: 24px 0 8px;">
        <img src="assets/images/logos/grupocsi.png" alt="Grupo CSI" style="max-height:60px;">
      </div>

      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" style="padding-top:8px;">

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" formControlName="email" autocomplete="username">
            <mat-icon matSuffix>account_circle</mat-icon>
            <mat-error *ngIf="f['email'].hasError('required')">Requerido</mat-error>
            <mat-error *ngIf="f['email'].hasError('email')">Email inválido</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Contraseña</mat-label>
            <input matInput [type]="ocultarPwd ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
            <button mat-icon-button matSuffix type="button" (click)="ocultarPwd = !ocultarPwd">
              <mat-icon>{{ ocultarPwd ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error *ngIf="f['password'].hasError('required')">Requerido</mat-error>
          </mat-form-field>

          <div *ngIf="errorMsg" style="color:#f44336; font-size:0.85rem; text-align:center; padding:4px 0 8px; display:flex; align-items:center; justify-content:center; gap:4px;">
            <mat-icon style="font-size:16px; width:16px; height:16px; line-height:16px;">error_outline</mat-icon>
            {{ errorMsg }}
          </div>

          <div style="margin-top:8px;">
            <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="loading">
              {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
            </button>
          </div>

          <div style="text-align:center; margin-top:16px;">
            <a routerLink="../forgot-password" mat-button color="primary">¿Olvidó su contraseña?</a>
          </div>

        </form>
      </mat-card-content>

    </mat-card>
  </div>
</div>
