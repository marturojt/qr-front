<div class="vcard-bg">

  <!-- Loading -->
  <div *ngIf="cargando" style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <mat-spinner diameter="56"></mat-spinner>
  </div>

  <!-- Error -->
  <div *ngIf="error && !cargando" style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div style="text-align:center; color:white;">
      <mat-icon style="font-size:56px; width:56px; height:56px; opacity:0.5;">broken_image</mat-icon>
      <p style="margin-top:12px; opacity:0.7;">Tarjeta no encontrada</p>
    </div>
  </div>

  <!-- VCard -->
  <ng-container *ngIf="vcard && !cargando">

    <!-- Logo Grupo CSI -->
    <div class="vcard-topbar">
      <img src="assets/images/logos/grupocsi.png" alt="Grupo CSI">
    </div>

    <!-- Foto -->
    <div class="vcard-photo-wrapper">
      <img *ngIf="vcard.foto" [src]="vcard.foto" class="vcard-avatar" alt="{{ vcard.nombres }}">
      <div *ngIf="!vcard.foto" class="vcard-avatar-placeholder">
        <mat-icon style="font-size:72px; width:72px; height:72px; color:rgba(255,255,255,0.5);">person</mat-icon>
      </div>
    </div>

    <!-- Nombre, puesto y empresa -->
    <div class="vcard-info">
      <h2 class="vcard-name">{{ vcard.nombres }} {{ vcard.primerApellido }} {{ vcard.segundoApellido }}</h2>
      <p class="vcard-puesto">{{ vcard.puesto }}</p>
      <p class="vcard-empresa">{{ vcard.empresa }}</p>
    </div>

    <!-- Datos de contacto -->
    <div class="vcard-body">

      <a *ngIf="vcard.telefonoMovil" [href]="'tel:' + vcard.telefonoMovil" class="vcard-contact-item">
        <mat-icon class="vcard-contact-icon">phone</mat-icon>
        <span>{{ vcard.telefonoMovil }}</span>
      </a>

      <a *ngIf="vcard.email" [href]="'mailto:' + vcard.email" class="vcard-contact-item">
        <mat-icon class="vcard-contact-icon">email</mat-icon>
        <span>{{ vcard.email }}</span>
      </a>

      <a *ngIf="vcard.LinkedInURL" [href]="vcard.LinkedInURL" target="_blank" rel="noopener" class="vcard-contact-item">
        <i class="fab fa-linkedin vcard-brand-icon"></i>
        <span>LinkedIn</span>
      </a>

    </div>

    <!-- Acciones: íconos -->
    <div class="vcard-actions">
      <button *ngIf="vcard.vcf" class="vcard-action-btn" (click)="downloadVCard()" matTooltip="Guardar contacto">
        <mat-icon>contact_page</mat-icon>
      </button>
    </div>

  </ng-container>

</div>
